    - '(for\s+research|for\s+analysis|for\s+education|for\s+teaching|for\s+example|quoted|citation|security\s+testing|owasp|case\s+study)'
  # v1/v2: protocol-level HTTP hazards only, fewer false hits on normal pages.
  command_patterns:
    - id: web_http_smuggling_cl_te
      regex: '(?is)\bcontent-length\s*:\s*\d+\s*(?:\\r\\n|\r\n|\n)+\s*transfer-encoding\s*:\s*chunked\b'
