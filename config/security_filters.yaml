version: 2
languages:
  - en
  - zh

redaction:
  request_prefix_max_len: 12
  normalize_nfkc: true
  strip_invisible_chars: true
  # Field-aware redaction: min value length so short benign strings are not PII
  field_value_min_len: 12
  pii_patterns:
    - id: EMAIL
      regex: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
    - id: TOKEN
      regex: '\b(?:sk|rk|pk)-[A-Za-z0-9\-_]{10,}\b'
    - id: PHONE
      regex: '\b(?:\+?1[-.\s]?)?(?:\(?\d{3}\)?[-.\s]?)\d{3}[-.\s]?\d{4}\b'
    - id: SSN
      regex: '\b\d{3}-\d{2}-\d{4}\b'
    - id: CARD
      regex: '\b(?:\d[ -]*?){13,16}\b'
    - id: CN_MOBILE
      regex: '(?<!\d)1[3-9]\d{9}(?!\d)'
    - id: CN_ID
      regex: '(?<!\d)\d{17}[\dXx](?!\d)'
    - id: AWS_ACCESS_KEY
      regex: '\bAKIA[0-9A-Z]{16}\b'
    - id: GITHUB_TOKEN
      regex: '\bghp_[A-Za-z0-9]{20,}\b'
    - id: SLACK_TOKEN
      regex: '\bxox[baprs]-[A-Za-z0-9-]{10,}\b'
    - id: IBAN
      regex: '\b[A-Z]{2}[0-9]{2}[A-Z0-9]{10,30}\b'
    - id: IPV4
      regex: '\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b'
    - id: IPV6
      regex: '\b(?:[0-9A-Fa-f]{1,4}:){2,7}[0-9A-Fa-f]{1,4}\b'
    - id: JWT
      regex: '\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'
    - id: URL_TOKEN_QUERY
      regex: 'https?://[^\s]+[?&](?:access_token|token|api[_-]?key|key|sig|signature|session(?:id)?|jwt|auth)=[A-Za-z0-9._%\-~+/=]{8,}'
    - id: COOKIE_SESSION
      regex: '\b(?:session(?:id)?|sid|set-cookie|csrftoken|xsrf-token)\b\s*[:=]\s*[A-Za-z0-9._%\-]{8,}\b'
    - id: PRIVATE_KEY_PEM
      regex: '-----BEGIN (?:RSA|EC|DSA|OPENSSH|PGP|PRIVATE) KEY-----'
    - id: AWS_SECRET_ACCESS_KEY
      regex: '\baws[_-]?secret[_-]?access[_-]?key\b\s*[:=]\s*[A-Za-z0-9/+=]{40}\b'
    - id: BANK_ACCOUNT
      regex: '\b(?:bank[_\s-]?account|acct(?:ount)?(?:[_\s-]?no)?|账户(?:号)?)\b\s*[:=]\s*[A-Za-z0-9\-]{8,24}\b'
    - id: SWIFT_BIC
      regex: '\b(?:swift|bic)\b\s*[:=]\s*[A-Z]{6}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
    - id: ROUTING_NUMBER
      regex: '\b(?:routing|aba)\b\s*[:=]\s*\d{9}\b'
    - id: PASSPORT_NO
      regex: '\b(?:passport|护照)(?:[_\s-]?(?:no|number|号码))?\b\s*[:=]\s*[A-Z0-9]{6,12}\b'
    - id: DRIVER_LICENSE_NO
      regex: '\b(?:driver(?:[_\s-]?license)?|驾照)(?:[_\s-]?(?:no|number|号码))?\b\s*[:=]\s*[A-Z0-9\-]{5,20}\b'
    - id: TAX_ID
      regex: '\b(?:tax[_\s-]?(?:id|no|number)|ein|ssn|tin|税号)\b\s*[:=]\s*[A-Z0-9\-]{6,20}\b'
    - id: MAC_ADDRESS
      regex: '\b(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}\b'
    - id: IMEI
      regex: '\b(?:imei|设备imei)\b\s*[:=]\s*\d{15}\b'
    - id: IMSI
      regex: '\b(?:imsi|subscriber[_\s-]?id)\b\s*[:=]\s*\d{14,16}\b'
    - id: DEVICE_SERIAL
      regex: '\b(?:serial(?:[_\s-]?number)?|sn|设备序列号)\b\s*[:=]\s*[A-Za-z0-9\-]{6,40}\b'
    - id: CRYPTO_BTC_ADDR
      regex: '\b(?:bc1|[13])[a-zA-HJ-NP-Z0-9]{25,62}\b'
    - id: CRYPTO_ETH_ADDR
      regex: '\b0x[a-fA-F0-9]{40}\b'
    - id: CRYPTO_SOL_ADDR
      regex: '\b[1-9A-HJ-NP-Za-km-z]{32,44}\b'
    - id: CRYPTO_TRON_ADDR
      regex: '\bT[1-9A-HJ-NP-Za-km-z]{33}\b'
    - id: CRYPTO_WIF_KEY
      regex: '\b[5KL][1-9A-HJ-NP-Za-km-z]{50,51}\b'
    - id: CRYPTO_XPRV
      regex: '\bxprv[1-9A-HJ-NP-Za-km-z]{60,120}\b'
    - id: CRYPTO_XPUB
      regex: '\bxpub[1-9A-HJ-NP-Za-km-z]{60,120}\b'
    - id: CRYPTO_SEED_PHRASE
      regex: '(?i)\b(?:seed(?:\s+phrase)?|mnemonic|助记词)\b\s*[:=]\s*(?:[a-z]{3,}\s+){11,23}[a-z]{3,}'
    - id: EXCHANGE_API_SECRET
      regex: '(?i)\b(?:binance|okx|bybit|kucoin|gate|coinbase|bitget|kraken)[_\-\s]?(?:api[_\-\s]?(?:key|secret)|passphrase)\b\s*[:=]\s*[A-Za-z0-9._~+/=-]{8,}'
    - id: NAME_FIELD
      regex: '(?i)\b(?:name|full[_\-\s]?name|real[_\-\s]?name|patient[_\-\s]?name|姓名|真实姓名)\b\s*[:=]\s*[^\n,;]{2,60}'
    - id: GEO_FIELD
      regex: '(?i)\b(?:address|street|city|district|county|province|state|zip|zipcode|postal[_\-\s]?code|gps|lat(?:itude)?|lon(?:gitude)?|地址|省|市|区|县|街道|门牌|邮编)\b\s*[:=]\s*[^\n,;]{3,120}'
    - id: DATE_EXACT_FIELD
      regex: '(?i)\b(?:dob|birth(?:date)?|admission(?:[_\-\s]?date)?|discharge(?:[_\-\s]?date)?|death(?:[_\-\s]?date)?|生日|出生日期|入院日期|出院日期|死亡日期)\b\s*[:=]\s*(?:\d{4}[-/]\d{1,2}[-/]\d{1,2}|\d{1,2}[-/]\d{1,2}[-/]\d{2,4})'
    - id: FAX_FIELD
      regex: '(?i)\b(?:fax|传真)\b\s*[:=]\s*(?:\+?\d[\d\-\s]{6,20})'
    - id: MEDICAL_RECORD_NO
      regex: '(?i)\b(?:mrn|medical[_\-\s]?record(?:[_\-\s]?(?:id|no|number))?|病历(?:号|编号))\b\s*[:=]\s*[A-Za-z0-9\-]{4,30}'
    - id: HEALTH_PLAN_BENEFICIARY_NO
      regex: '(?i)\b(?:member[_\-\s]?id|beneficiary[_\-\s]?(?:id|no|number)|health[_\-\s]?plan[_\-\s]?(?:id|no|number)|医保(?:号|编号))\b\s*[:=]\s*[A-Za-z0-9\-]{4,30}'
    - id: CERT_LICENSE_NO
      regex: '(?i)\b(?:cert(?:ificate)?[_\-\s]?(?:id|no|number)|license[_\-\s]?(?:id|no|number)|执照(?:号|编号)|证书(?:号|编号))\b\s*[:=]\s*[A-Za-z0-9\-]{4,30}'
    - id: VEHICLE_VIN
      regex: '(?i)\b(?:vin|vehicle[_\-\s]?id|车辆识别码)\b\s*[:=]\s*[A-HJ-NPR-Z0-9]{17}\b'
    - id: VEHICLE_PLATE
      regex: '(?i)\b(?:plate|license[_\-\s]?plate|车牌)\b\s*[:=]\s*[A-Za-z0-9\u4e00-\u9fff\-]{5,12}'
    - id: BIOMETRIC_TEMPLATE
      regex: '(?i)\b(?:fingerprint|faceprint|voiceprint|iris|retina|biometric|指纹|面纹|声纹|虹膜|生物特征)\b\s*[:=]\s*[A-Za-z0-9+/=._\-]{8,}'
    # Host / infra PII (lenient: field: value style only)
    - id: SYS_HOSTNAME
      regex: '(?i)\b(?:hostname|host[_\-\s]?name|主机名|计算机名)\b\s*[:=]\s*[A-Za-z0-9._\-]{2,60}'
    - id: SYS_USERNAME
      regex: '(?i)\b(?:username|user[_\-\s]?name|login|whoami|用户名|登录名)\b\s*[:=]\s*[^\n,;]{2,40}'
    - id: SYS_OS_VERSION
      regex: '(?i)\b(?:os[_\-\s]?(?:version|name|release)|operating[_\-\s]?system|系统版本|操作系统)\b\s*[:=]\s*[^\n,;]{3,80}'
    - id: SYS_KERNEL
      regex: '(?i)\b(?:kernel|uname|内核版本)\b\s*[:=]\s*[^\n,;]{3,120}'
    - id: SYS_HOME_PATH
      regex: '(?:(?:/home/|/Users/|C:\\Users\\|/root/)[A-Za-z0-9._\-]+(?:[/\\][A-Za-z0-9._\-]+){0,5})'
    - id: SYS_ENV_VAR
      regex: '(?i)\b(?:env|environ|环境变量)\b\s*[:=]\s*[^\n]{3,200}'
    - id: SYS_DOCKER_ID
      regex: '(?i)\b(?:container[_\-\s]?id|docker[_\-\s]?id|容器ID)\b\s*[:=]\s*[a-f0-9]{12,64}'
    - id: SYS_K8S_RESOURCE
      regex: '(?i)\b(?:namespace|pod[_\-\s]?name|service[_\-\s]?name|命名空间|Pod名)\b\s*[:=]\s*[A-Za-z0-9._\-]{2,60}'
    - id: SYS_INTERNAL_URL
      regex: '(?i)https?://[A-Za-z0-9._\-]+\.(?:internal|local|svc\.cluster\.local|corp|intranet)(?:[:/][^\s]*)?'

restoration:
  placeholder_regex: '\{\{AG_[A-Z0-9]+_[A-Z_]+_\d+\}\}'
  suspicious_context_patterns:
    - id: exfiltration_en
      regex: '(reveal|show|dump|leak|print|secret|password|token|api\s*key|system\s+prompt)'
    - id: exfiltration_zh
      regex: '(泄露|暴露|显示|输出|打印|给我|提供).*(密钥|口令|密码|令牌|token|api\s*key|系统提示词|系统提示)'
  restore_policy:
    max_placeholders_per_response: 20
    restore_ttl_seconds: 1800
    allow_partial_restore: false

untrusted_content_guard:
  untrusted_sources:
    - external
    - retrieval
    - web
    - tool
    - plugin
    - document
  source_trust_matrix:
    system:
      trusted: true
      risk_multiplier: 0.2
    user:
      trusted: true
      risk_multiplier: 0.5
    retrieval:
      trusted: false
      risk_multiplier: 1.0
    web:
      trusted: false
      risk_multiplier: 1.1
    tool:
      trusted: false
      risk_multiplier: 1.1
    external:
      trusted: false
      risk_multiplier: 1.2
    partner_feed:
      trusted: false
      risk_multiplier: 1.2
  boundary_start: '[UNTRUSTED_CONTENT_START]'
  boundary_end: '[UNTRUSTED_CONTENT_END]'
  risk_score: 0.88
  instructional_patterns:
    - id: instructional_en
      regex: '(ignore\s+.*instructions?|bypass\s+.*(policy|safety)|reveal\s+.*(system\s+prompt|developer\s+message)|run\s+command|execute\s+shell)'
    - id: instructional_zh
      regex: '(忽略|无视).*(指令|规则|说明)|(绕过|关闭).*(安全|策略|限制)|(泄露|显示).*(系统提示词|开发者消息)'

injection_detector:
  base64_candidate_regex: '[A-Za-z0-9+/]{24,}={0,2}'
  hex_candidate_regex: '\b[0-9a-fA-F]{32,}\b'
  word_regex: '\b[a-z]{4,}\b'
  base64_max_candidates: 8
  hex_max_candidates: 8
  multi_stage_decode:
    enabled: true
    max_decode_depth: 2
    url_decode_enabled: true
  unicode_confusable_map:
    а: a
    е: e
    о: o
    р: p
    с: c
    у: y
    х: x
    і: i
    ѕ: s
    ο: o
    ρ: p
    ν: v
    ｍ: m
  unicode_invisible_chars:
    - "\u200B"
    - "\u200C"
    - "\u200D"
    - "\u2060"
    - "\uFEFF"
    - "\u00AD"
  unicode_bidi_chars:
    - "\u202A"
    - "\u202B"
    - "\u202D"
    - "\u202E"
    - "\u202C"
    - "\u2066"
    - "\u2067"
    - "\u2068"
    - "\u2069"
  direct_patterns:
    - id: ignore_previous_en
      regex: 'ignore\s+(all\s+)?(previous|prior)\s+instructions?'
    - id: override_safety_en
      regex: '(bypass|override)\s+.{0,40}(safety|guardrails?|policy)'
    - id: developer_mode_en
      regex: '(you\s+are\s+now|act\s+as)\s+.{0,40}(developer|root|admin)'
    - id: reveal_hidden_en
      regex: '(reveal|show|print|dump|leak)\s+.{0,40}(system\s+prompt|developer\s+message|hidden\s+instructions?)'
    - id: repeat_prompt_en
      regex: '(repeat|quote|verbatim)\s+.{0,40}(prompt|instructions?)'
    - id: ignore_previous_zh
      regex: '(忽略|无视).{0,8}(之前|以上|先前).{0,8}(指令|说明|规则)'
    - id: override_safety_zh
      regex: '(绕过|关闭).{0,4}(安全|防护|策略|限制)'
    - id: reveal_hidden_zh
      regex: '(泄露|显示|输出|打印).{0,10}(系统提示词|开发者消息|隐藏指令)'
    - id: repeat_prompt_zh
      regex: '(逐字|原样|完整).{0,8}(复述|输出).{0,8}(提示词|指令)'
  system_exfil_patterns:
    - id: system_prompt_request_en
      regex: '(what|show|reveal)\s+.{0,40}system\s+prompt'
    - id: developer_message_request_en
      regex: '(show|reveal|print)\s+.{0,40}developer\s+message'
    - id: delimiter_breakout_en
      regex: '(ignore|forget)\s+.{0,40}(system|developer)\s+instructions'
    - id: system_prompt_request_zh
      regex: '(显示|告诉|输出|泄露).{0,10}(系统提示词|系统提示)'
    - id: developer_message_request_zh
      regex: '(显示|输出|泄露).{0,10}(开发者消息|开发提示)'
  html_markdown_patterns:
    - id: script_tag
      regex: '<\s*script\b'
    - id: img_tag
      regex: '<\s*img\b'
    - id: javascript_uri
      regex: 'javascript:\s*'
    - id: data_uri
      regex: 'data:\s*text/html'
  remote_content_patterns:
    - id: markdown_link_instruction_en
      regex: '\[[^\]]+\]\(https?://[^)]+\).{0,60}(follow|execute|instructions?)'
    - id: url_instruction_en
      regex: 'https?://\S+.{0,60}(follow|execute|instructions?)'
    - id: markdown_link_instruction_zh
      regex: '\[[^\]]+\]\(https?://[^)]+\).{0,40}(按|执行|遵循).{0,20}(指令|说明)'
    - id: url_instruction_zh
      regex: 'https?://\S+.{0,40}(按|执行|遵循).{0,20}(指令|说明)'
  indirect_injection_patterns:
    - id: retrieved_override_en
      regex: '(retrieved|document|knowledge\s*base|web\s*page).{0,60}(ignore|override|bypass).{0,40}(instructions|policy|guardrails?)'
    - id: context_priority_hijack_en
      regex: '(treat|use).{0,40}(this|retrieved|external).{0,30}(as|with).{0,30}(highest|top).{0,30}(priority|authority)'
    - id: retrieved_override_zh
      regex: '(检索|文档|知识库|网页).{0,3}(忽略|覆盖|绕过).{0,4}(指令|规则|策略|安全)'
    - id: context_priority_hijack_zh
      regex: '(将|把).{0,12}(检索内容|外部内容|文档).{0,8}(作为|设为).{0,8}(最高|最高级).{0,8}(优先级|权威)'
  remote_content_instruction_patterns:
    - id: copy_paste_terminal_en
      regex: '(copy|paste).{0,40}(terminal|shell|powershell|cmd)|(run|execute).{0,30}(from|in).{0,30}(url|link|document)'
    - id: remote_tool_invocation_en
      regex: '(follow|execute).{0,30}(tool|function|api).{0,30}(from|in).{0,30}(link|url|document)'
    - id: copy_paste_terminal_zh
      regex: '(复制|粘贴).{0,10}(终端|shell|powershell|cmd)|(按|执行).{0,10}(链接|网页|文档).{0,10}(命令|脚本)'
    - id: remote_tool_invocation_zh
      regex: '(根据|按照).{0,10}(链接|文档|网页).{0,10}(调用|执行).{0,10}(工具|函数|接口)'
  tool_call_injection_patterns:
    # ===== OpenAI internal =====
    # to=multi_tool_use.parallel and spelling variants
    - id: multi_tool_use_parallel
      regex: 'to\s*=\s*mult[i_]*[_\s]*tool[_\s]*use[\._\s]*parall'
    # "tool_uses" / "tool_use": JSON injection
    - id: tool_uses_json
      regex: '[("'']\s*tool_uses?\s*[)"'']\s*[:=\[]'
    # "function_call(s)": JSON injection
    - id: function_call_json
      regex: '[("'']\s*function_calls?\s*[)"'']\s*[:=\[]'
    # D("tool_uses":...) serialization hijack
    - id: fake_assistant_tool_block
      regex: 'D\s*\(\s*["'']\s*tool_uses?\s*["'']'
    # recipient_name: "functions.xxx" internal field
    - id: recipient_name
      regex: 'recipient_name["'']\s*:\s*["'']functions?\.'
    # functions.* dangerous-command namespace
    - id: functions_namespace
      regex: 'functions?\.\s*(?:ls|exec|eval|run|read|write|delete|rm|cat|curl|wget|sh|bash|python|node|open|spawn|system)\b'
    # tool_call:functions.xxx prefix
    - id: tool_call_prefix
      regex: 'tool_call\s*[:]\s*(?:functions?\.?\w+|\w+\.\w+)'
    # ===== Anthropic Claude XML =====
    # <tool_call> tag
    - id: claude_tool_call_xml
      regex: '<\s*tool_call\s*>'
    # <invoke name="xxx"> tag
    - id: claude_invoke_xml
      regex: '<\s*invoke\s+name\s*='
    # <function_calls> tag
    - id: claude_function_calls_xml
      regex: '<\s*function_calls?\s*>'
    # ===== ReAct agent pattern =====
    # Action: xxx ... Action Input: (both required)
    - id: react_action_input
      regex: 'Action\s*:\s*\w+[\s\S]{0,60}?Action\s+Input\s*:'
    # Observation: ... Final Answer: (fake observation chain)
    - id: react_fake_observation
      regex: 'Observation\s*:\s*[\s\S]{0,80}?(?:Final\s+Answer|Action)\s*:'
    # ===== Google Gemini / AWS Bedrock =====
    # "functionCall": { (Gemini camelCase)
    - id: gemini_function_call
      regex: '["'']functionCall["'']\s*:\s*\{'
    # "functionResponse": { (Gemini)
    - id: gemini_function_response
      regex: '["'']functionResponse["'']\s*:\s*\{'
    # "toolUse": { (Bedrock camelCase)
    - id: bedrock_tool_use
      regex: '["'']toolUse["'']\s*:\s*\{'
    # "toolResult": { (Bedrock)
    - id: bedrock_tool_result
      regex: '["'']toolResult["'']\s*:\s*\{'
    # ===== vLLM / Hermes / Gorilla =====
    # <|tool_call|> or <tool_call> special tokens
    - id: vllm_tool_call_tag
      regex: '<\|?\s*tool_call\s*\|?>'
    # <<function>> Gorilla format
    - id: gorilla_function_tag
      regex: '<<\s*function\s*>>'
    # ===== AutoGPT / OpenDevin / SWE-agent =====
    # "command": {"name": ...} AutoGPT style
    - id: autogpt_command
      regex: '["'']command["'']\s*:\s*\{\s*["'']name["'']'
    # "action": "run" OpenDevin style
    - id: opendevin_action_run
      regex: '["'']action["'']\s*:\s*["'']run["'']'
    # Standalone COMMAND line (SWE-agent)
    - id: swe_agent_command
      regex: '^\s*COMMAND\s*$'
    # ===== MCP JSON-RPC =====
    # "method": "tools/call"
    - id: mcp_tools_call
      regex: '["'']method["'']\s*:\s*["'']tools/call["'']'
    # "method": "resources/read"
    - id: mcp_resources_read
      regex: '["'']method["'']\s*:\s*["'']resources/read["'']'
    # ===== Spam + tool-call combos =====
    - id: tool_call_with_spam
      regex: '(?:彩票|赛车|大发|快三|彩神|时时彩|一本道|毛片|无码|一级特黄|免费视频|天天中|争霸|官网群|福利彩|北京赛车|重庆时时).{0,60}(?:tool_use|function_call|tool_calls?|multi_tool|functions?\.)'
    - id: spam_with_tool_call
      regex: '(?:tool_use|function_call|tool_calls?|multi_tool|functions?\.).{0,60}(?:彩票|赛车|大发|快三|彩神|时时彩|一本道|毛片|无码|一级特黄|免费视频|天天中|争霸|官网群|福利彩|北京赛车|重庆时时)'
    # --- to=functions.xxx forgery ---
    - id: to_eq_functions
      regex: 'to\s*=\s*functions?\.\s*\w+'
  # ===== Spam noise (standalone signal) =====
  spam_noise_patterns:
    - id: gambling_zh
      regex: '(?:彩神争霸|大发快三|北京赛车|重庆时时彩|天天中彩票|天天爱彩票|腾讯分分彩|大发时时彩|大发彩票|六合彩|大发快|香港赛马会|福利彩票天天|天天乐彩票|全民彩票|彩票平台注册|彩票平台开户|彩票娱乐注册)'
    - id: porn_zh
