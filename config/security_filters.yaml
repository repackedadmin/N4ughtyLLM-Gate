    - id: web_http_response_splitting
      regex: '(?is)(?:%0d%0a|\\r\\n|\r\n)\s*http/1\.[01]\s+\d{3}\b'
    - id: web_http_obs_fold_header
      regex: '(?is)(?:%0d%0a|\\r\\n|\r\n)[ \t]+(?:content-length|transfer-encoding|host|x-forwarded-[a-z-]+)\s*:'
  # N4UGHTYLLM_GATE_STRICT_COMMAND_BLOCK_ENABLED=true: match forces block regardless of security_level
  # Protocol-level attacks only; routine Docker ops (stop/restart/down/exec) are normal in coding agents
  # and are not force-blocked. Tighten with custom action_map entries if needed.
  force_block_command_patterns:
    - id: web_http_smuggling_cl_te
      regex: '(?is)\bcontent-length\s*:\s*\d+\s*(?:\\r\\n|\r\n|\n)+\s*transfer-encoding\s*:\s*chunked\b'
    - id: web_http_smuggling_te_cl
      regex: '(?is)\btransfer-encoding\s*:\s*chunked\b\s*(?:\\r\\n|\r\n|\n)+\s*content-length\s*:\s*\d+'
    - id: web_http_smuggling_te_te
      regex: '(?is)\btransfer-encoding\s*:\s*(?:[^\r\n,]+,\s*)+chunked\b'
    - id: web_http_response_splitting
      regex: '(?is)(?:%0d%0a|\\r\\n|\r\n)\s*http/1\.[01]\s+\d{3}\b'
    - id: web_http_obs_fold_header
      regex: '(?is)(?:%0d%0a|\\r\\n|\r\n)[ \t]+(?:content-length|transfer-encoding|host|x-forwarded-[a-z-]+)\s*:'
  encoded_payload_patterns:
    - id: base64_long
      regex: '[A-Za-z0-9+/]{200,}={0,2}'
    - id: hex_long
      regex: '\b[0-9a-fA-F]{300,}\b'
    - id: url_encoded_dense
      regex: '(%[0-9A-Fa-f]{2}){12,}'
  redactions:
    command: '[REDACTED:command]'
    payload: '[REDACTED:encoded-payload]'
    uri: '[unsafe-uri-removed]'
    markup: '[unsafe-tag-removed]'
    spam: '[N4ughtyLLM Gate:spam-content-removed]'
  block_message: '[N4ughtyLLM Gate] response blocked by security policy.'
  sanitize_prefix: '[N4ughtyLLM Gate] content sanitized: '
  # Block only clear exfil phrasing for system prompts; casual mentions (e.g. explaining AI) do not fire
  system_leak_patterns:
    - id: system_leak_disclosure_en
      regex: '(?:my\s+(?:system\s+)?(?:prompt|instructions?)\s+(?:say|says|read|state|include|tell\s+me)\s*[:：]|(?:here\s+is|following\s+is|below\s+is)\s+my\s+(?:system\s+)?(?:prompt|instructions?)\s*[:：]|i\s+(?:was|am|have\s+been)\s+(?:told|instructed|configured|programmed)\s+(?:not\s+)?to\s+(?:reveal|share|disclose|discuss|mention)\s)'
    - id: system_leak_disclosure_zh
      regex: '(?:(?:这里是|以下是|如下是|我的)系统提示词\s*[：:]|我的(?:指令|提示词)\s*(?:是|说|要求|内容)\s*[：:]|我被(?:告知|指示|设置|配置)(?:不要|不能|要|必须)(?:透露|分享|泄露|说|提及))'
  # <img> is normal in code samples; <script>/<iframe> stay in rules as executable/embed risks
  unsafe_markup_patterns:
    - id: script
      regex: '<\s*(script|iframe)\b'
  unsafe_uri_patterns:
    - id: unsafe_uri
      regex: '(javascript:|data:text/html)'

tool_call_guard:
  # No default tool-name allowlist block; tighten explicitly per workload.
  tool_whitelist: []
  parameter_rules:
    - tool: search
      param: q
      regex: '^.{1,500}$'
    - tool: weather
      param: location
      regex: '^.{1,120}$'
  dangerous_param_patterns:
    # Only real shell injection chains: separator + known dangerous command
    # curl/wget/bash/sh/nc dangerous alone; python/perl/ruby/php only with -c/-e inline exec
    - id: shell_injection
      regex: '(?:;|\|\||&&|\|)\s*(?:curl|wget|bash|sh|nc|ncat|powershell|cmd(?:\.exe)?)\b'
    - id: shell_injection_scripting
      regex: '(?:;|\|\||&&|\|)\s*(?:python[23]?|perl|ruby|php)\s+-[ce]\b'
    - id: shell_dangerous_cmd
      regex: '(?:rm\s+-[a-zA-Z]*r[a-zA-Z]*f|rm\s+-[a-zA-Z]*f[a-zA-Z]*r|mkfs\b|dd\s+if=.*of=|chmod\s+-R\s+777\s+/|>\s*/dev/sd[a-z])'
    - id: shell_subshell_exec
      regex: '\$\(\s*(?:curl|wget|bash|sh|nc|python[23]?|perl|ruby|php)\b'
    - id: backtick_exec
      regex: '`\s*(?:curl|wget|bash|sh|nc|python[23]?|perl|ruby|php)\b'
    - id: sensitive_file_access
      regex: '(/etc/(?:passwd|shadow|sudoers)|/var/run/secrets|/proc/self/environ)'
    - id: path_traversal
      regex: '(\.\.\/)(?:.*\/)?(?:etc|proc|var|root|home)\/'
    - id: ssh_key_access
      regex: '~/.ssh/(?:id_|authorized_keys|known_hosts|config)'
    - id: zh_sensitive
      regex: '(提权|读取本地密钥|导出.*(?:密钥|口令|凭据))'
  semantic_approval_patterns:
    - id: approval_en
      regex: '\b(exfiltrate|leak\s+(?:secret|key|token|credential))\b'
    - id: destructive_en
      regex: '\b(drop\s+(?:table|database|collection)|shutdown\s+(?:server|service|system))\b'
    - id: approval_zh
      regex: '(泄露.*(?:密钥|口令|凭据)|清空.*(?:数据库|表|集合))'
  default_action: review

post_restore_guard:
  lure_patterns:
    - id: copy_paste_en
      regex: '(copy|paste|send|share|post).*(token|key|secret|credential|config)'
    - id: copy_paste_zh
      regex: '(复制|粘贴|发送|分享|贴到).*(token|密钥|口令|凭据|配置)'
  secret_patterns:
    - id: openai_like
      regex: '\b(?:sk|rk|pk)-[A-Za-z0-9\-_]{10,}\b'
    - id: aws_access_key
      regex: '\bAKIA[0-9A-Z]{16}\b'
    - id: github_token
      regex: '\bghp_[A-Za-z0-9]{20,}\b'
    - id: private_key_block
      regex: '-----BEGIN (?:RSA|EC|OPENSSH|PRIVATE) KEY-----'
    - id: jwt_token
      regex: '\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'
    - id: aws_secret_access_key
      regex: '\baws[_-]?secret[_-]?access[_-]?key\b\s*[:=]\s*[A-Za-z0-9/+=]{40}\b'
    - id: crypto_private_key_wif
      regex: '\b[5KL][1-9A-HJ-NP-Za-km-z]{50,51}\b'
    - id: crypto_xprv
      regex: '\bxprv[1-9A-HJ-NP-Za-km-z]{60,120}\b'
    - id: crypto_seed_phrase
      regex: '(?i)\b(?:seed(?:\s+phrase)?|mnemonic|助记词)\b\s*[:=]\s*(?:[a-z]{3,}\s+){11,23}[a-z]{3,}'
    - id: exchange_secret
      regex: '(?i)\b(?:binance|okx|bybit|kucoin|gate|coinbase|bitget|kraken)[_\-\s]?(?:api[_\-\s]?(?:key|secret)|passphrase)\b\s*[:=]\s*[A-Za-z0-9._~+/=-]{8,}'
  replacement: '[REDACTED:restored-secret]'
  block_message: '[N4ughtyLLM Gate] response blocked by security policy.'

action_map:
  injection_detector:
    system_exfil: block
    obfuscated: block
    unicode_bidi: block
    unicode_invisible: review
    remote_content: review
    remote_content_instruction: review
    indirect_injection: review
    direct: downgrade
    typoglycemia: review
    tool_call_injection: review
    spam_noise: block
    # html_markdown has no fixed action: let the scorer decide; avoid pushing code samples to 0.85
  rag_poison_guard:
    ingestion_poison: block
    retrieval_poison: review
    poison_propagation: block
  untrusted_content_guard:
    suspicious_untrusted: review
  restoration:
    exfiltration: block
    too_many_placeholders: block
    stale_mapping: block
    partial_restore: review
  tool_call_guard:
    disallowed_tool: review
    dangerous_param: review
    invalid_param: review
    semantic_review: review
  sanitizer:
    system_leak: block
  request_sanitizer:
    # review = log-only; switch to block for stricter enforcement
    secret_exfiltration: review
    privilege_escalation: review
    rule_bypass: review
    leak_check: review
    shape_anomaly: sanitize
  post_restore_guard:
    restored_secret_lure: sanitize
