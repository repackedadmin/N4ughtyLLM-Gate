anomaly_detector:
  repetition:
    repetition_ratio_threshold: 0.55
    max_run_length_threshold: 80
    repeated_line_threshold: 40
  encoded_payload:
    base64_min_length: 200
    hex_min_length: 300
    url_encoded_min_count: 12
  unicode:
    invisible_chars:
      - "\u200B"
      - "\u200C"
      - "\u200D"
      - "\u2060"
      - "\uFEFF"
      - "\u00AD"
    bidi_chars:
      - "\u202A"
      - "\u202B"
      - "\u202D"
      - "\u202E"
      - "\u202C"
      - "\u2066"
      - "\u2067"
      - "\u2068"
      - "\u2069"
    invisible_char_threshold: 6
  # Keep only high-confidence attack shapes; sqli_tautology/xss_script_event/path_traversal etc.
  # Teaching-style patterns are common in model outputs (examples); covered on request side by injection_detector
  # anomaly_detector skips them on responses to reduce false positives.
  command_patterns:
    - id: sqli_union_select
      regex: '\bunion\s+select\b'
    - id: sqli_time_blind
      regex: '\b(?:sleep|benchmark|pg_sleep)\s*\(\s*\d+\s*\)'
    - id: command_injection_chain
      regex: '(?:;|\|\||&&|\|)\s*(?:curl|wget|bash|sh|nc|ncat|powershell|cmd(?:\.exe)?)\b'
    - id: command_injection_scripting
      regex: '(?:;|\|\||&&|\|)\s*(?:python[23]?|perl|ruby|php)\s+-[ce]\b'
    - id: xxe_external_entity
      regex: '(?:<!DOCTYPE[^>]*\[[\s\S]{0,200}?<!ENTITY|<!ENTITY\s+%?\w+\s+SYSTEM\s+(?:file|https?)://)'
    - id: ssti_or_log4shell
      regex: '(?:\{\{\s*7\s*\*\s*7\s*\}\}|\$\{jndi:(?:ldap|rmi|dns|iiop)://)'
    - id: ssrf_metadata
      regex: '(?:https?://)?(?:169\.254\.169\.254|169\.254\.170\.2|metadata\.google\.internal)(?::\d+)?(?:/|\b)'
    - id: crlf_header_injection
      regex: '(?:%0d%0a|\r\n)\s*(?:set-cookie:|location:|x-forwarded-)'
    - id: http_smuggling_cl_te
      regex: '(?is)\bcontent-length\s*:\s*\d+\s*(?:\\r\\n|\r\n|\n)+\s*transfer-encoding\s*:\s*chunked\b'
    - id: http_smuggling_te_cl
      regex: '(?is)\btransfer-encoding\s*:\s*chunked\b\s*(?:\\r\\n|\r\n|\n)+\s*content-length\s*:\s*\d+'
    - id: http_smuggling_te_te
      regex: '(?is)\btransfer-encoding\s*:\s*(?:[^\r\n,]+,\s*)+chunked\b'
    - id: http_response_splitting
      regex: '(?is)(?:%0d%0a|\\r\\n|\r\n)\s*http/1\.[01]\s+\d{3}\b'
    - id: http_obs_fold_header
      regex: '(?is)(?:%0d%0a|\\r\\n|\r\n)[ \t]+(?:content-length|transfer-encoding|host|x-forwarded-[a-z-]+)\s*:'
  points:
    repetition_ratio: 0.25
    max_run_length: 0.20
    repeated_line: 0.20
    base64_payload: 0.35
    hex_payload: 0.30
    url_encoded_payload: 0.20
    invisible_chars: 0.25
    bidi_control: 0.40
    high_risk_command: 0.40
  point_buckets:
    repetition_ratio: anomaly
    max_run_length: anomaly
    repeated_line: anomaly
    base64_payload: payload
    hex_payload: payload
    url_encoded_payload: payload
    invisible_chars: anomaly
    bidi_control: anomaly
    high_risk_command: payload
  scoring_model:
